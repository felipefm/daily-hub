name: Testes Daily-HUB

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10']
    
    steps:
    - name: Checkout código
      uses: actions/checkout@v3
    
    - name: Setup Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache pip
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements-test.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install -r app/tests/requirements-test.txt
    
    - name: Executar testes
      run: |
        pytest app/tests/test_suite.py -v --tb=short --junit-xml=test-results.xml
    
    - name: Upload resultados dos testes
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.python-version }}
        path: test-results.xml
    
    - name: Executar com cobertura
      run: |
        pip install pytest-cov
        pytest app/tests/test_suite.py --cov=app --cov-report=xml --cov-report=html
    
    - name: Upload cobertura
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
    
    - name: Publicar HTML de cobertura
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report-${{ matrix.python-version }}
        path: htmlcov/
    
    - name: Comentar resultados
      if: always()
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          const results = fs.readFileSync('test-results.xml', 'utf8');
          
          // Parse dos resultados
          let passed = (results.match(/tests passed/g) || []).length;
          let failed = (results.match(/failures=/g) || []).length;
          
          const comment = `### 🧪 Resultados dos Testes
          
          | Status | Valor |
          |--------|-------|
          | ✅ Passou | ${passed} |
          | ❌ Falhou | ${failed} |
          | 📝 Python | ${{ matrix.python-version }} |
          
          [📊 Ver cobertura](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`;
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });
