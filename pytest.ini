[pytest]
# Configuração do pytest para Daily-HUB

# Caminho de teste
testpaths = tests

# Python files
python_files = test_*.py

# Python classes
python_classes = Test*

# Python functions
python_functions = test_*

# Markers personalizados
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Testes lentos (deselect with '-m "not slow"')

# Output options
addopts = 
    --strict-markers
    --tb=short
    -v

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] [%(filename)s:%(lineno)d] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Timeout
timeout = 300
